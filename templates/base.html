<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SEEN — A PrinciplesYou Reflection{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <header class="site-header">
    <nav class="nav">
      <a href="/" class="wordmark" aria-label="SEEN home">
        <span class="wordmark-mark" aria-hidden="true"></span>
        <span class="wordmark-text">
          <span class="wordmark-primary">SEEN</span>
          <span class="wordmark-sub">An Archetypes Reflection</span>
        </span>
      </a>
      <div class="nav-links">
        <a href="/gallery" class="nav-link">Gallery</a>
        <a href="https://principlesyou.com/archetypes" class="nav-link" target="_blank" rel="noopener">View archetypes ↗</a>
      </div>
    </nav>
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
  {% block footer %}
  {% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
